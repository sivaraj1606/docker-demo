apiVersion: apps/v1
kind: Deployment

metadata:
  name: landing-page

spec:
  replicas: 2

  selector:
    matchLabels:
      app: landing-page

  template:
    metadata:
      labels:
        app: landing-page

    spec:
      containers:
        - name: landing-page
          image: 23mis0488/landing-page:latest
          ports:
            - containerPort: 80
