apiVersion: apps/v1
kind: Deployment

metadata:
  name: landing-page

spec:
  replicas: 2

  selector:
    matchLabels:
      app: landing-page

  template:
    metadata:
      labels:
        app: landing-page

    spec:
      containers:
        - name: landing-page
          image: 23mis0488/docker-demo:latest #dockerhub repo name
          ports:
            - containerPort: 80
            
apiVersion: v1
kind: Service

metadata:
  name: landing-page-service

spec:
  type: NodePort

  selector:
    app: landing-page

  ports:
    - port: 80
      targetPort: 80
      nodePort: 30011
